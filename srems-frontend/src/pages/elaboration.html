<div class="page-container">
  <div class="page-header">
    <div class="page-title-section">
      <h1 class="page-title">Elaboration</h1>
      <p class="page-subtitle">Detailed requirements analysis and breakdown</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline-primary hidden" id="btnFreezeElaboration">
        <span>🧊</span> Freeze Phase
      </button>      <button class="btn btn-outline-danger hidden" id="btnDeleteElaboration">
        <span>🗑️</span> Delete Phase
      </button>      <button class="btn btn-primary" id="btnCreateElaboration">
        <span class="btn-icon">➕</span> Create Phase
      </button>
      <button class="btn btn-primary hidden" id="btnStartElaboration">
        <span class="btn-icon">▶️</span> Start Elaborating
      </button>
    </div>
  </div>

  <!-- Status Overview -->
  <div class="elaboration-status">
    <div class="status-card">
      <h4>Requirements to Elaborate</h4>
      <div class="status-value" id="reqToElaborate">0</div>
    </div>
    <div class="status-card">
      <h4>In Progress</h4>
      <div class="status-value" id="reqInProgress">0</div>
    </div>
    <div class="status-card">
      <h4>Completed</h4>
      <div class="status-value" id="reqCompleted">0</div>
    </div>
    <div class="status-card">
      <h4>Progress</h4>
      <div class="progress-bar">
        <div id="elaborationProgress" class="progress-fill" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <!-- Elaboration Items -->
  <div id="elaborationContainer" class="elaboration-items">
    <div class="loading-spinner">
      <div class="loader"><div class="cell d-0"></div><div class="cell d-1"></div><div class="cell d-2"></div><div class="cell d-1"></div><div class="cell d-2"></div><div class="cell d-3"></div><div class="cell d-2"></div><div class="cell d-3"></div><div class="cell d-4"></div></div>
      Loading requirements...
    </div>
  </div>
</div>

<!-- Elaboration Detail Modal -->
<div id="elaborationModal" class="modal hidden">
  <div class="modal-content modal-xl">
    <div class="modal-header">
      <h2 id="elaborationTitle">Elaborate Requirement</h2>
      <button class="modal-close" data-close-modal="elaborationModal">&times;</button>
    </div>
    <form id="elaborationForm" class="form-stack">
      <div class="form-group">
        <label class="form-label">Requirement</label>
        <div class="requirement-display" id="reqDisplay"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="elab-acceptance-criteria" class="form-label">Acceptance Criteria *</label>
          <textarea id="elab-acceptance-criteria" class="form-control" rows="4" required maxlength="1000"></textarea>
        </div>

        <div class="form-group">
          <label for="elab-dependencies" class="form-label">Dependencies</label>
          <textarea id="elab-dependencies" class="form-control" rows="3" maxlength="500"></textarea>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="elab-effort" class="form-label">Effort (Hours)</label>
          <input type="number" id="elab-effort" class="form-control" min="0" step="0.5" />
        </div>

        <div class="form-group">
          <label for="elab-risk-level" class="form-label">Risk Level</label>
          <select id="elab-risk-level" class="form-control">
            <option value="">Select Level</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="elab-notes" class="form-label">Technical Notes</label>
        <textarea id="elab-notes" class="form-control" rows="3" maxlength="500"></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" data-close-modal="elaborationModal">Save & Close</button>
        <button type="submit" class="btn btn-primary">Save & Next</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Modal -->
<div id="deleteElaborationModal" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close" data-close-modal="deleteElaborationModal">&times;</button>
    <h3>Delete Elaboration Phase</h3>
    <form id="deleteElaborationForm" class="modal-form">
      <label for="elabDeletionReasonType" class="form-label">Deletion Reason <span class="required">*</span></label>
      <select id="elabDeletionReasonType" class="form-control" required>
        <option value="">Select reason</option>
        <option value="duplicate_phase">Duplicate</option>
        <option value="test_or_demo_phase_cleanup">Test / Demo Cleanup</option>
        <option value="created_by_admin_mistake">Admin Error</option>
        <option value="other">Other</option>
      </select>

      <label for="elabDeletionReasonDescription" class="form-label">Description (optional)</label>
      <textarea id="elabDeletionReasonDescription" class="form-control" rows="3" placeholder="Additional details..."></textarea>

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" data-close-modal="deleteElaborationModal">Cancel</button>
        <button type="submit" class="btn btn-danger">Delete Elaboration</button>
      </div>
    </form>
  </div>
</div>
